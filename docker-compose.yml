services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegram-bots-portfolio:latest
    container_name: portfolio
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s